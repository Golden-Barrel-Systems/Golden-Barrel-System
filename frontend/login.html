<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Golden Bar</title>
    <link rel="stylesheet" href="./css/pages.css/login.css" />
  </head>
  <body>
    <div class="container">
      <div class="img-section" style="background-image: url('./images/pages/login/img_page-0001.jpg'); background-position: center; background-size: cover; background-repeat: no-repeat;">
        <a href="./index.html">Voltar</a>
      </div>
      <div class="login-section">
        <div class="content">
          <h1 class="title">Login - Golden Barrel System</h1>
          <div class="form-login">
            <div class="email">
              <label for="input_email">Email</label>
              <input type="text" id="input_email" class="input" placeholder="Insira seu Email aqui"/>
            </div>
            <div class="password">
              <label for="input_senha">Senha</label>
              <input type="password" id="input_senha" class="input" placeholder="Insira sua senha aqui"/>
            </div>
            <div class="verification-code">
              <label for="input_codigo">Código de segurança</label>
              <input type="text" id="input_codigo" class="input" placeholder="Insira o código aqui"/>
            </div>
            <p class="create-account">Ainda não tem conta? <a href="./cadastro.html"><span>criar conta</span></a></p>
            <a class="btn-logar" id="btn-logar">Logar</a>
          </div>
      </div>
      </div>
    </div>
    <script src="./js/login.js"></script>
  </body>
</html>
