<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte</title>
</head>
<body>
    <main>
        <div class="app">
            <div class="title">
                <h1>Suporte</h1>
            </div>
            <div class="chamados">
                <!-- Em produção, populado pelo backend -->
                <div class="chamado">
                    <h2>Chamado #12345</h2>
                    <p><strong>Assunto:</strong> Problema de login</p>
                    <p><strong>Status:</strong> Aberto</p>
                    <p><strong>Data de abertura:</strong> 01/01/2024</p>
                    <p><strong>Descrição:</strong> Não consigo acessar minha conta, aparece uma mensagem de erro.</p>
                    <!-- Se o suporte for nivel abaixo de 3, terá o botão para repassar o chamado -->
                    <button class="btn-repassar">Repassar para nível superior</button>
                </div>
            </div>
            <!-- Se o usuário tiver permissão para acessar o chatbot -->
            <div class="chat-bot opened">
                <h2>BoB IA</h2>
                <div id="chat-bot-msg"></div>
                <div class="input-mensagem">
                    <textarea name="user-input" id="user-input" placeholder="Digite sua mensagem..."></textarea>
                </div>
                <button id="btn-enviar">Enviar</button>
            </div>
        </div>
    </main>
    <script src="./js/suporte.js"></script>
</body>
</html>
