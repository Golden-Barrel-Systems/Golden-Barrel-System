<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Golden Bar</title>
    <link rel="stylesheet" href="./css/pages.css/cadastro.css" />
</head>

<body>
    <div class="container">
        <div class="img-section"
            style="background-image: url('./images/pages/cadastro/img_page-0001.jpg'); background-position: center; background-size: cover; background-repeat: no-repeat;">
            <button onclick="voltar()">Voltar</button>
        </div>
        <div class="cadastro-section">
            <div class="content">
                <h1 class="title">Cadastro - Golden Barrel System</h1>
                <div class="form-cadastro">
                    <div class="nome">
                        <label for="input_nome">Nome <span id="mensagemnome"></span></label>
                        <input type="text" id="input_nome" class="input" placeholder="Insira seu nome aqui" />
                    </div>
                    <div class="cpf">
                        <label for="input_codigo">CPF <span id="mensagemcpf"></span></label>
                        <input type="text" id="input_CPF" maxlength="14" oninput="CPF()" class="input"
                            placeholder="Confirme seu CPF aqui" />
                    </div>
                    <div class="email">
                        <label for="input_email">Email <span id="mensagememail"></span></label>
                        <input type="text" id="input_email" class="input" placeholder="Insira seu email aqui" />
                    </div>
                    <div class="password">
                        <label for="input_senha">Senha <span id="mensagemsenha"></span></label>
                        <input type="password" id="input_senha" oninput="senhaa()" class="input"
                            placeholder="Insira sua senha aqui" />
                    </div>
                    <div class="confirm-password">
                        <label for="input_confi_senha">Confirme sua senha <span id="mensagemconfirm"></span></label>
                        <input type="password" id="input_confi_senha" class="input"
                            placeholder="Confirme sua senha aqui" />
                    </div>
                    <div class="codigo">
                        <label for="input_codigo">Código da empresa <span id="mensagemcod"></span></label>
                        <input type="password" id="input_codigo" class="input" placeholder="Confirme seu código aqui" />
                    </div>
                    <div class="login-link">
                        <a href="./login.html">Já tem uma conta?</a>
                    </div>


                    <button class="btn-logar" onclick="cadastrar()">cadastrar</button>
                </div>
            </div>
</body>

</html>

<script src="./js/cadastro.js"></script>
